<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fripz — Test analyse IA</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#5b8a72; --teal-dark:#47745c; --teal-light:#dde8e0;
    --ink:#2b3a30; --muted:#6b7d72; --line:#e3e9e4; --bg:#f6f8f6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:32px 16px}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:24px;margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 24px;font-size:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 8px 30px rgba(43,58,48,.06)}
  .drop{border:2px dashed var(--teal-light);border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:.15s;background:#fafcfb;display:block}
  .drop:hover{border-color:var(--teal);background:var(--teal-light)}
  .drop input{display:none}
  .drop p{margin:8px 0 0;color:var(--muted);font-size:14px}
  .thumbs{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .thumb{position:relative;border-radius:12px;overflow:hidden;background:#f0f3f1;aspect-ratio:1/1;border:1px solid var(--line)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border:none;border-radius:50%;
              background:rgba(43,58,48,.7);color:#fff;font-size:13px;line-height:22px;cursor:pointer;padding:0}
  .count{margin-top:8px;font-size:12px;color:var(--muted);text-align:center}
  .btn{margin-top:16px;width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;
       color:#fff;background:var(--teal);cursor:pointer;font-family:inherit;transition:.15s}
  .btn:hover{background:var(--teal-dark)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .status{margin-top:16px;font-size:14px;color:var(--muted);text-align:center;display:none}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--teal-light);
           border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .result{margin-top:20px;display:none}
  .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;gap:16px}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--muted);font-weight:500;flex:0 0 auto}
  .row .v{font-weight:600;text-align:right}
  .err{margin-top:16px;display:none;background:#fff0ee;border:1px solid #ffd9d3;color:#a3352a;
       padding:14px;border-radius:12px;font-size:13px;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<div class="wrap">
  <h1>Test analyse IA 🪄</h1>
  <p class="sub">Ajoute jusqu'à 3 photos du même article (face, dos, étiquette). L'IA propose catégorie, marque, taille, état, titre et description.</p>

  <div class="card">
    <label class="drop" id="drop">
      <span style="font-size:28px">📷</span>
      <p><strong>Clique pour ajouter des photos</strong><br>jusqu'à 3 — JPG ou PNG</p>
      <input type="file" id="file" accept="image/*" multiple>
    </label>

    <div class="thumbs" id="thumbs"></div>
    <div class="count" id="count"></div>

    <button class="btn" id="analyze" disabled>Analyser avec l'IA</button>

    <div class="status" id="status"></div>
    <div class="err" id="err"></div>

    <div class="result" id="result">
      <div class="row"><span class="k">Catégorie</span><span class="v" id="r-categorie">—</span></div>
      <div class="row"><span class="k">Marque</span><span class="v" id="r-marque">—</span></div>
      <div class="row"><span class="k">Couleur</span><span class="v" id="r-couleur">—</span></div>
      <div class="row"><span class="k">Taille</span><span class="v" id="r-taille">—</span></div>
      <div class="row"><span class="k">État</span><span class="v" id="r-etat">—</span></div>
      <div class="row"><span class="k">Titre</span><span class="v" id="r-titre">—</span></div>
      <div class="row"><span class="k">Description</span><span class="v" id="r-description">—</span></div>
    </div>
  </div>
</div>

<script>
  var MAX = 3;
  var fileInput = document.getElementById('file');
  var thumbsBox = document.getElementById('thumbs');
  var countBox = document.getElementById('count');
  var btn = document.getElementById('analyze');
  var statusEl = document.getElementById('status');
  var err = document.getElementById('err');
  var result = document.getElementById('result');

  // Liste des photos sélectionnées (dataURL)
  var photos = [];

  fileInput.addEventListener('change', function (e) {
    var files = Array.prototype.slice.call(e.target.files || []);
    files.forEach(function (f) {
      if (photos.length >= MAX) return;
      var reader = new FileReader();
      reader.onload = function () {
        if (photos.length >= MAX) return;
        photos.push(reader.result);
        render();
      };
      reader.readAsDataURL(f);
    });
    // Permet de re-sélectionner le même fichier ensuite
    fileInput.value = '';
  });

  function render() {
    thumbsBox.innerHTML = '';
    photos.forEach(function (src, i) {
      var div = document.createElement('div');
      div.className = 'thumb';
      var im = document.createElement('img');
      im.src = src;
      var del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.onclick = function () { photos.splice(i, 1); render(); };
      div.appendChild(im);
      div.appendChild(del);
      thumbsBox.appendChild(div);
    });
    countBox.textContent = photos.length + ' / ' + MAX + ' photo(s)';
    btn.disabled = photos.length === 0;
    err.style.display = 'none';
    result.style.display = 'none';
  }

  // Redimensionne une image (max 1024px) pour alléger l'envoi.
  function resizeImage(dataUrl) {
    return new Promise(function (resolve) {
      var image = new Image();
      image.onload = function () {
        var max = 1024;
        var w = image.width, h = image.height;
        if (w > max || h > max) {
          if (w >= h) { h = Math.round(h * max / w); w = max; }
          else { w = Math.round(w * max / h); h = max; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(image, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      image.onerror = function () { resolve(dataUrl); };
      image.src = dataUrl;
    });
  }

  btn.addEventListener('click', async function () {
    if (photos.length === 0) return;
    btn.disabled = true;
    err.style.display = 'none';
    result.style.display = 'none';
    statusEl.style.display = 'block';
    statusEl.innerHTML = '<span class="spinner"></span>Analyse en cours…';

    try {
      // Redimensionner toutes les photos en parallèle
      var resized = await Promise.all(photos.map(function (p) { return resizeImage(p); }));

      var resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: resized })
      });

      var data = await resp.json();

      if (!resp.ok) {
        throw new Error('Erreur ' + resp.status + ' : ' + JSON.stringify(data, null, 2));
      }

      document.getElementById('r-categorie').textContent = data.categorie || '—';
      document.getElementById('r-marque').textContent = data.marque || '—';
      document.getElementById('r-couleur').textContent = data.couleur || '—';
      document.getElementById('r-taille').textContent = data.taille || '—';
      document.getElementById('r-etat').textContent = data.etat || '—';
      document.getElementById('r-titre').textContent = data.titre || '—';
      document.getElementById('r-description').textContent = data.description || '—';
      result.style.display = 'block';
      statusEl.style.display = 'none';
    } catch (e2) {
      statusEl.style.display = 'none';
      err.style.display = 'block';
      err.textContent = String((e2 && e2.message) || e2);
    } finally {
      btn.disabled = photos.length === 0;
    }
  });
</script>
</body>
</html>
